name: orggraph

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 17 + pgvector 0.8.2 — vector store for RQ3 baseline
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg17
    container_name: orggraph-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orggraph}
      POSTGRES_USER: ${POSTGRES_USER:-orggraph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orggraph2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orggraph} -d ${POSTGRES_DB:-orggraph}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Neo4j 5.26 LTS Enterprise — organizational knowledge graph for RQ3
  # Pinning to LTS (5.26) instead of current (2026.03) for thesis stability.
  # APOC + Graph Data Science plugins auto-installed on first boot.
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5.26-enterprise
    container_name: orggraph-neo4j
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-orggraph2026}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_PLUGINS: '["apoc","graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*,fleetManagement.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*,gds.*,fleetManagement.*"
      # Memory sized for 148 persons + 425 entities + ~2k edges + topic extraction
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
    volumes:
      - neo4jdata:/data
      - neo4jlogs:/logs
      - ./docker/neo4j/plugins:/plugins
      - neo4jimport:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # vLLM inference — Gemma 4 31B-IT on DGX Spark (GB10, ARM64)
  # The `gemma4-cu130` tag has Gemma 4 arch support + CUDA 13.0 for Blackwell.
  # Enable with: docker compose --profile dgx up
  # ---------------------------------------------------------------------------
  vllm-inference:
    image: vllm/vllm-openai:gemma4-cu130
    container_name: orggraph-vllm-inference
    profiles: ["dgx"]
    restart: unless-stopped
    ipc: host
    ports:
      - "${VLLM_INFERENCE_PORT:-8000}:8000"
    volumes:
      - hfcache:/root/.cache/huggingface
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    command:
      - "--model"
      - "${INFERENCE_MODEL:-google/gemma-4-31B-it}"
      - "--max-model-len"
      - "8192"
      - "--dtype"
      - "bfloat16"
      - "--gpu-memory-utilization"
      - "0.55"
      - "--tool-call-parser"
      - "gemma4"
      - "--reasoning-parser"
      - "gemma4"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 600s

  # ---------------------------------------------------------------------------
  # vLLM embeddings — EmbeddingGemma 300M (768-dim output, MRL to 128/256/512)
  # Generic vLLM image is fine for embedding models (no Gemma 4 tool parsing).
  # ---------------------------------------------------------------------------
  vllm-embed:
    image: vllm/vllm-openai:latest
    container_name: orggraph-vllm-embed
    profiles: ["dgx"]
    restart: unless-stopped
    ipc: host
    ports:
      - "${VLLM_EMBED_PORT:-8001}:8000"
    volumes:
      - hfcache:/root/.cache/huggingface
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    command:
      - "--model"
      - "${EMBED_MODEL:-google/embeddinggemma-300m}"
      - "--task"
      - "embed"
      - "--dtype"
      - "bfloat16"
      - "--gpu-memory-utilization"
      - "0.05"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  pgdata:
  neo4jdata:
  neo4jlogs:
  neo4jimport:
  hfcache:
