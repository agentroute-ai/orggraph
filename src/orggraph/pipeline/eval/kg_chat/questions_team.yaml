  - id: T5
    category: hiring_judgment
    question: "I'm thinking of promoting John Arnold to VP of trading. Talk to someone who works with him directly AND someone senior to him. Honest reads only — I want the warts and the strengths."
    expected_tools: [get_person, get_org_chart, get_pair_signals]
    grading:
      kind: judge
      prompt: "Does the answer combine a peer-level / direct-report view AND a senior-level view of John Arnold? Specific evidence, not just opinion."
    team_grading:
