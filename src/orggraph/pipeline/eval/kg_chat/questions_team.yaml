    expected_tools: [get_centrality, find_topic_collaborators, get_person]
    grading:
      kind: judge
      prompt: "Does the answer identify ONE specific person (with a name, not 'the head of trading') and justify their influence with network / communication evidence, NOT just by org chart position?"
    team_grading:
      expected_initial: [john_lavorato, lawrence_greg_whalley, louise_kitchen, jeffrey_shankman]
      expected_targets:
        trading_floor: [john_arnold, phillip_allen, barry_tycholiz, scott_neal, frank_vickers]
      min_categories_covered: 1

  - id: T9
    category: bottleneck_diagnosis
    question: "John Lavorato is drowning in requests but commitments back from his team are weak. Find out who the biggest offender is — someone who keeps asking but rarely delivers. Verify with anyone close enough to Lavorato to confirm."
